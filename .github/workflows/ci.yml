name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

env:
  DOTNET_VERSION: '10.0.x'
  # ReactiveUI/Splat's author signing certificate was revoked upstream,
  # so a fresh `dotnet restore` fails with NU3012 (revoked cert) for
  # packages that are otherwise the correct published versions. Skip NuGet
  # signature verification in CI so a third-party cert revocation can't
  # block the build. Tracked alongside the ReactiveUI removal in #343.
  DOTNET_NUGET_SIGNATURE_VERIFICATION: false

jobs:
  # ── 1. Linux: full T1 gate, plus the Linux-only release-adjacent gates
  #        (coverage, pdf20 conformance, benchmark suite) that don't yet
  #        have a portable equivalent worth tripling the runner cost for.
  #        See #646 for the T0-T3 tier definitions this job targets. ──────
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Detect whether GUI-relevant code changed. The headless PdfEditor.Tests
      # suite is slow and Avalonia-dispatcher-sensitive; there's no need to run
      # it for library-only changes (e.g. a Pdfe.Core-only PR). It still always
      # runs on pushes to main as a post-merge integration safety net.
      #
      # Only the Linux job honours this conditional: macOS and Windows always
      # run PdfEditor.Tests unconditionally (see those jobs below) because
      # #612's MacNativeMenuBuilder regression was itself platform-specific
      # and not a GUI-code-path change that this filter would have caught.
      - name: Detect changed areas
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            gui:
              - 'PdfEditor/**'
              - 'PdfEditor.Tests/**'

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache nuget
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-linux-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-linux-

      - name: Set up Java (for veraPDF)
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install veraPDF
        # veraPDF drives the PDF/UA-1 conformance gate (PdfUaConformanceTests,
        # #413) and the corpus tests. The UA test skips gracefully if veraPDF is
        # absent, so a download/installer outage must not fail the whole job —
        # keep the install best-effort. (The old pinned 1.28.1 URL 404'd; use the
        # versionless latest installer.)
        continue-on-error: true
        run: |
          set -uo pipefail
          # Download veraPDF. curl -f fails on HTTP errors (so we never unzip an
          # error page), with retries for transient flakiness.
          curl -fSL --retry 3 --connect-timeout 30 \
            https://software.verapdf.org/releases/verapdf-installer.zip \
            -o /tmp/verapdf.zip \
            || { echo "::warning::veraPDF download failed; skipping veraPDF setup"; exit 0; }
          unzip -q /tmp/verapdf.zip -d /tmp/verapdf-installer \
            || { echo "::warning::veraPDF archive invalid; skipping veraPDF setup"; exit 0; }

          # Create installation response file for silent install.
          # Unquoted heredoc so $HOME expands (izpack doesn't expand env vars; a
          # quoted heredoc would create a literal "$HOME/verapdf" directory).
          cat > /tmp/auto-install.xml << EOF
          <?xml version="1.0" encoding="UTF-8" standalone="no"?>
          <AutomatedInstallation langpack="eng">
              <com.izforge.izpack.panels.htmlhello.HTMLHelloPanel id="welcome"/>
              <com.izforge.izpack.panels.target.TargetPanel id="install_dir">
                  <installpath>$HOME/verapdf</installpath>
              </com.izforge.izpack.panels.target.TargetPanel>
              <com.izforge.izpack.panels.packs.PacksPanel id="sdk_pack_select">
                  <pack index="0" name="veraPDF GUI" selected="false"/>
                  <pack index="1" name="veraPDF Mac and *nix Scripts" selected="true"/>
                  <pack index="2" name="veraPDF Validation model" selected="true"/>
                  <pack index="3" name="veraPDF Documentation" selected="false"/>
                  <pack index="4" name="veraPDF Sample Plugins" selected="false"/>
              </com.izforge.izpack.panels.packs.PacksPanel>
              <com.izforge.izpack.panels.install.InstallPanel id="install"/>
              <com.izforge.izpack.panels.finish.FinishPanel id="finish"/>
          </AutomatedInstallation>
          EOF

          # Find and run installer
          cd /tmp/verapdf-installer
          INSTALLER=$(find . \( -name "verapdf-izpack-installer-*.jar" -o -name "verapdf-greenfield-*.jar" -o -name "verapdf-*installer*.jar" \) | head -1)
          if [ -z "$INSTALLER" ]; then
            echo "::warning::veraPDF installer jar not found; skipping veraPDF setup"
            exit 0
          fi
          java -jar "$INSTALLER" /tmp/auto-install.xml || \
            { echo "::warning::veraPDF install failed; continuing without it"; exit 0; }

          # Verify installation (non-fatal)
          ~/verapdf/verapdf --version || true

      - name: Install xvfb for headless UI tests
        if: steps.changes.outputs.gui == 'true' || github.ref == 'refs/heads/main'
        run: sudo apt-get install -y xvfb

      - name: Restore packages
        run: dotnet restore

      - name: Verify TRUE Redaction Implementation
        run: ./scripts/verify-true-redaction.sh

      # Gate asymmetry (#618): CORRECTNESS is a blocking gate, PERFORMANCE is a
      # budget. A perf regression may never be resolved by weakening a correctness
      # assertion. This fails a PR that touches a perf-sensitive path AND rewrites
      # the expected values of a test, unless the commit explicitly says
      # "Correctness-Expectations-Changed: <why>".
      #
      # It is not hypothetical: 8a8e661 changed the tile quantization constants and,
      # in the same commit, rewrote ContinuousDpiTests' expected values. Legitimate
      # edit, unacceptable mechanism — nothing signalled that an optimization had
      # just redefined "correct".
      - name: Gate asymmetry (correctness cannot be weakened by perf)
        run: ./scripts/check-gate-asymmetry.sh origin/${{ github.base_ref || 'main' }}

      - name: Build (Debug)
        run: dotnet build pdfe.sln -c Debug

      - name: Run Pdfe.Core.Tests with coverage
        run: |
          dotnet test Pdfe.Core.Tests --no-build -c Debug \
            --collect:"XPlat Code Coverage" \
            --results-directory coverage/ \
            --logger "console;verbosity=normal" \
            --logger "trx;LogFileName=core.trx" \
            --verbosity normal

      # Skip budget (#619): a test that silently stops running is coverage loss you
      # cannot see. A security-relevant assertion
      # (HiddenTextToggles_DoNotLoadOcrAssemblyBeforeRasterizedScan) quietly stopped
      # executing when unrelated tests were added to its class, and the suite stayed
      # green. Fails when the skip set CHANGES in either direction.
      #
      # Reads the trx from the run above rather than executing the suite a second
      # time — a gate should not double the CI bill to count skips.
      - name: Skip budget (Pdfe.Core.Tests)
        run: ./scripts/check-skip-budget.sh Pdfe.Core.Tests/Pdfe.Core.Tests.csproj --trx coverage/core.trx

      - name: Install reportgenerator
        run: mkdir -p tools && dotnet tool install --tool-path ./tools dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          ./tools/reportgenerator \
            -reports:coverage/*/coverage.cobertura.xml \
            -targetdir:coverage/report \
            -reporttypes:Cobertura

      - name: Coverage Gate (Pdfe.Core >= 93%)
        # Restored to the 93% ratchet (#603) — the branch had drifted to
        # 89.78% not because coverage was genuinely hard to reach, but
        # because six test files hard-coded a Linux-only system font path
        # (/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf) and silently
        # skipped on every macOS/Windows dev machine (a real instance of the
        # #619 "invisible coverage loss" pattern, just not one the skip-
        # budget gate happened to be watching). Fixed by bundling the fonts
        # as embedded test resources (Pdfe.Core.Tests/Fixtures/Fonts/,
        # NOTICE.md) instead of depending on system fonts, plus focused
        # tests for the previously-untested PdfIccProfile matrix/lut16 paths.
        # Measured 93.01% locally after the fix — keep this at exactly 93%,
        # not padded, so the next real regression still trips the gate.
        #
        # reportgenerator's Cobertura output is named Cobertura.xml (not
        # coverage.cobertura.xml — that's coverlet's raw collector name).
        run: scripts/check-coverage.sh coverage/report/Cobertura.xml 0.93 Pdfe.Core

      - name: Run Pdfe.Cli.Tests
        run: |
          dotnet test Pdfe.Cli.Tests --no-build -c Debug \
            --logger "console;verbosity=normal"

      - name: Run Pdfe.Avalonia.Tests
        # Lightweight, non-GUI tests for the viewer libraries (API gates, pure
        # logic). Deliberately separate from the heavy, flaky headless
        # PdfEditor.Tests suite so viewer-library changes get reliable coverage
        # on every PR. (#363, #384)
        run: |
          dotnet test Pdfe.Avalonia.Tests --no-build -c Debug \
            --logger "console;verbosity=normal"

      - name: Run Pdfe.Rendering.Tests (deterministic only)
        run: |
          # The PR gate runs only environment-independent rendering tests
          # (root SkiaRenderer "renders without error", string-escape, Fonts
          # table parsing). The following are environment-sensitive and should
          # be run locally with scripts/run-visual-regression-local.sh before a
          # release candidate, not on paid GitHub-hosted runners:
          # - Corpus: too slow.
          # - Differential: compares against the external `mutool` binary +
          #   sample PDFs absent in CI → empty [Theory] → "No data found".
          # - Benchmark: timing/allocation thresholds that flake under the
          #   full parallel suite (pass in isolation).
          # - Visual: pixel-baseline comparisons that differ with CI's fonts /
          #   Skia/freetype build.
          dotnet test Pdfe.Rendering.Tests --no-build -c Debug \
            --filter "FullyQualifiedName!~Corpus&FullyQualifiedName!~Differential&FullyQualifiedName!~Benchmark&FullyQualifiedName!~Visual" \
            --logger "console;verbosity=normal"

      - name: PDF 2.0 Renderer Conformance Gate
        run: scripts/run-pdf20-renderer-conformance.sh --run-tests

      - name: Run Performance Benchmark Tests (informational)
        # Allocation/timing thresholds are environment-sensitive; run them for
        # visibility but don't fail the gate. Release candidates should run the
        # local long/visual suites on a known developer machine.
        run: |
          dotnet test Pdfe.Rendering.Tests --no-build -c Debug \
            --filter "FullyQualifiedName~PerformanceBenchmark|FullyQualifiedName~MemoryBenchmark" \
            --logger "console;verbosity=normal" || true

      - name: Run Benchmark Suite Regression Gate
        # Deterministic synthetic benchmark gate for #344/#357. The no-oracle
        # mode keeps CI independent of MuPDF/Poppler/Ghostscript availability
        # while still failing on pdfe parser/render/redaction regressions and
        # verifying the benchmark report contract.
        run: |
          CONFIG=Debug scripts/run-benchmarks.sh suite \
            --oracles none \
            --page-limit 1 \
            --output-dir logs/ci-benchmark-suite \
            --include-cli-render \
            --fail-on-regression

      - name: Run Pdfe.Ocr.Tests
        run: |
          dotnet test Pdfe.Ocr.Tests --no-build -c Debug \
            --logger "console;verbosity=normal" || true

      - name: Run PdfEditor.Tests (headless with xvfb)
        # Skipped for library-only changes (see "Detect changed areas"); always
        # runs on main. Library changes that affect the GUI are caught by the
        # main run before any release is cut.
        #
        # Runs the FULL suite, including the *_MatchesBaseline visual tests. The
        # chronic #363 "host process exited unexpectedly" crash was root-caused
        # to xunit's default collection parallelism racing SkiaSharp's
        # process-wide native font manager (the GUI tests render with real Skia,
        # UseHeadlessDrawing=false). The suite is now serialized via
        # [assembly: CollectionBehavior(DisableTestParallelization = true)] in
        # PdfEditor.Tests/AssemblyInfo.cs, which eliminates the concurrent native
        # font access; the full suite (incl. *_MatchesBaseline) was validated
        # crash-free across repeated runs. The earlier *_MatchesBaseline
        # exclusion (a workaround) is therefore removed.
        if: steps.changes.outputs.gui == 'true' || github.ref == 'refs/heads/main'
        run: |
          xvfb-run -a dotnet test PdfEditor.Tests --no-build -c Debug \
            --logger "console;verbosity=normal" \
            --blame-hang-timeout 120000

      - name: Upload coverage report as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/report/
          retention-days: 30

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-linux
          path: |
            **/TestResults/
            **/*.trx
          retention-days: 7

  # ── 2. macOS: T1 gate, always including PdfEditor.Tests unconditionally.
  #        #647 exists because #612 (a MacNativeMenuBuilder checkmark-state
  #        regression) shipped silently — no CI job ran on macOS at all, so
  #        the GUI-changed-files conditional the Linux job uses is
  #        deliberately NOT applied here: any change, GUI-labelled or not,
  #        could regress native macOS menu behaviour. ─────────────────────
  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache nuget
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-macos-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-macos-

      - name: Set up Java (for veraPDF)
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install veraPDF
        # Same izpack installer as Linux; the jar is cross-platform and Java
        # is already set up above. Best-effort — see the Linux job's install
        # step for the full rationale.
        continue-on-error: true
        run: |
          set -uo pipefail
          curl -fSL --retry 3 --connect-timeout 30 \
            https://software.verapdf.org/releases/verapdf-installer.zip \
            -o /tmp/verapdf.zip \
            || { echo "::warning::veraPDF download failed; skipping veraPDF setup"; exit 0; }
          unzip -q /tmp/verapdf.zip -d /tmp/verapdf-installer \
            || { echo "::warning::veraPDF archive invalid; skipping veraPDF setup"; exit 0; }

          cat > /tmp/auto-install.xml << EOF
          <?xml version="1.0" encoding="UTF-8" standalone="no"?>
          <AutomatedInstallation langpack="eng">
              <com.izforge.izpack.panels.htmlhello.HTMLHelloPanel id="welcome"/>
              <com.izforge.izpack.panels.target.TargetPanel id="install_dir">
                  <installpath>$HOME/verapdf</installpath>
              </com.izforge.izpack.panels.target.TargetPanel>
              <com.izforge.izpack.panels.packs.PacksPanel id="sdk_pack_select">
                  <pack index="0" name="veraPDF GUI" selected="false"/>
                  <pack index="1" name="veraPDF Mac and *nix Scripts" selected="true"/>
                  <pack index="2" name="veraPDF Validation model" selected="true"/>
                  <pack index="3" name="veraPDF Documentation" selected="false"/>
                  <pack index="4" name="veraPDF Sample Plugins" selected="false"/>
              </com.izforge.izpack.panels.packs.PacksPanel>
              <com.izforge.izpack.panels.install.InstallPanel id="install"/>
              <com.izforge.izpack.panels.finish.FinishPanel id="finish"/>
          </AutomatedInstallation>
          EOF

          cd /tmp/verapdf-installer
          INSTALLER=$(find . \( -name "verapdf-izpack-installer-*.jar" -o -name "verapdf-greenfield-*.jar" -o -name "verapdf-*installer*.jar" \) | head -1)
          if [ -z "$INSTALLER" ]; then
            echo "::warning::veraPDF installer jar not found; skipping veraPDF setup"
            exit 0
          fi
          java -jar "$INSTALLER" /tmp/auto-install.xml || \
            { echo "::warning::veraPDF install failed; continuing without it"; exit 0; }

          ~/verapdf/verapdf --version || true

      - name: Restore packages
        run: dotnet restore

      - name: Verify TRUE Redaction Implementation
        run: ./scripts/verify-true-redaction.sh

      - name: Gate asymmetry (correctness cannot be weakened by perf)
        run: ./scripts/check-gate-asymmetry.sh origin/${{ github.base_ref || 'main' }}

      - name: Build (Debug)
        run: dotnet build pdfe.sln -c Debug

      - name: Run Pdfe.Core.Tests
        # No coverage collection here — the coverage gate is Linux-only
        # (one definition, avoids threshold drift between platforms); font
        # fixtures are embedded resources (#603) so this needs no system
        # font install to pass identically to Linux.
        run: |
          dotnet test Pdfe.Core.Tests --no-build -c Debug \
            --logger "console;verbosity=normal"

      - name: Run Pdfe.Cli.Tests
        run: |
          dotnet test Pdfe.Cli.Tests --no-build -c Debug \
            --logger "console;verbosity=normal"

      - name: Run Pdfe.Avalonia.Tests
        run: |
          dotnet test Pdfe.Avalonia.Tests --no-build -c Debug \
            --logger "console;verbosity=normal"

      - name: Run Pdfe.Rendering.Tests (deterministic only)
        # Same filter rationale as the Linux job — see that job's comment.
        run: |
          dotnet test Pdfe.Rendering.Tests --no-build -c Debug \
            --filter "FullyQualifiedName!~Corpus&FullyQualifiedName!~Differential&FullyQualifiedName!~Benchmark&FullyQualifiedName!~Visual" \
            --logger "console;verbosity=normal"

      - name: Run PdfEditor.Tests
        # Unconditional (see job comment) and no xvfb wrapper: Avalonia's
        # headless platform (UseHeadless, UseHeadlessDrawing=false in
        # PdfEditor.Tests/UI/TestAppBuilder.cs) renders through real Skia
        # without needing an X server, so it needs no display-server shim on
        # macOS. *_MatchesBaseline visual-pixel tests are excluded: they're
        # calibrated to Linux CI's specific Skia/freetype/font build, exactly
        # as noted for the equivalent Linux exclusions elsewhere in this file.
        run: |
          dotnet test PdfEditor.Tests --no-build -c Debug \
            --filter "FullyQualifiedName!~MatchesBaseline" \
            --logger "console;verbosity=normal" \
            --blame-hang-timeout 120000

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-macos
          path: |
            **/TestResults/
            **/*.trx
          retention-days: 7

  # ── 3. Windows: T1 gate, always including PdfEditor.Tests unconditionally
  #        (same rationale as macOS above). Default shell is pwsh, matching
  #        release.yml's windows-exe job; bash scripts are invoked through
  #        Git Bash (always present on windows-latest) rather than ported to
  #        PowerShell, so there is exactly one implementation of each gate
  #        script instead of a shell-specific fork. ──────────────────────
  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache nuget
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-windows-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-windows-

      - name: Set up Java (for veraPDF)
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install veraPDF
        shell: pwsh
        continue-on-error: true
        run: |
          & "C:\Program Files\Git\bin\bash.exe" -c "
            set -uo pipefail
            curl -fSL --retry 3 --connect-timeout 30 \
              https://software.verapdf.org/releases/verapdf-installer.zip \
              -o /tmp/verapdf.zip \
              || { echo '::warning::veraPDF download failed; skipping veraPDF setup'; exit 0; }
            unzip -q /tmp/verapdf.zip -d /tmp/verapdf-installer \
              || { echo '::warning::veraPDF archive invalid; skipping veraPDF setup'; exit 0; }
            cat > /tmp/auto-install.xml << EOF
          <?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"no\"?>
          <AutomatedInstallation langpack=\"eng\">
              <com.izforge.izpack.panels.htmlhello.HTMLHelloPanel id=\"welcome\"/>
              <com.izforge.izpack.panels.target.TargetPanel id=\"install_dir\">
                  <installpath>\$HOME/verapdf</installpath>
              </com.izforge.izpack.panels.target.TargetPanel>
              <com.izforge.izpack.panels.packs.PacksPanel id=\"sdk_pack_select\">
                  <pack index=\"0\" name=\"veraPDF GUI\" selected=\"false\"/>
                  <pack index=\"1\" name=\"veraPDF Mac and *nix Scripts\" selected=\"true\"/>
                  <pack index=\"2\" name=\"veraPDF Validation model\" selected=\"true\"/>
                  <pack index=\"3\" name=\"veraPDF Documentation\" selected=\"false\"/>
                  <pack index=\"4\" name=\"veraPDF Sample Plugins\" selected=\"false\"/>
              </com.izforge.izpack.panels.packs.PacksPanel>
              <com.izforge.izpack.panels.install.InstallPanel id=\"install\"/>
              <com.izforge.izpack.panels.finish.FinishPanel id=\"finish\"/>
          </AutomatedInstallation>
          EOF
            cd /tmp/verapdf-installer
            INSTALLER=\$(find . \( -name 'verapdf-izpack-installer-*.jar' -o -name 'verapdf-greenfield-*.jar' -o -name 'verapdf-*installer*.jar' \) | head -1)
            if [ -z \"\$INSTALLER\" ]; then
              echo '::warning::veraPDF installer jar not found; skipping veraPDF setup'
              exit 0
            fi
            java -jar \"\$INSTALLER\" /tmp/auto-install.xml || \
              { echo '::warning::veraPDF install failed; continuing without it'; exit 0; }
            ~/verapdf/verapdf --version || true
          "

      - name: Restore packages
        run: dotnet restore

      - name: Verify TRUE Redaction Implementation
        shell: pwsh
        run: |
          & "C:\Program Files\Git\bin\bash.exe" ./scripts/verify-true-redaction.sh

      - name: Gate asymmetry (correctness cannot be weakened by perf)
        shell: pwsh
        run: |
          & "C:\Program Files\Git\bin\bash.exe" ./scripts/check-gate-asymmetry.sh "origin/${{ github.base_ref || 'main' }}"

      - name: Build (Debug)
        run: dotnet build pdfe.sln -c Debug

      - name: Run Pdfe.Core.Tests
        # No coverage collection — see the macOS job's identical note.
        run: |
          dotnet test Pdfe.Core.Tests --no-build -c Debug `
            --logger "console;verbosity=normal"

      - name: Run Pdfe.Cli.Tests
        run: |
          dotnet test Pdfe.Cli.Tests --no-build -c Debug `
            --logger "console;verbosity=normal"

      - name: Run Pdfe.Avalonia.Tests
        run: |
          dotnet test Pdfe.Avalonia.Tests --no-build -c Debug `
            --logger "console;verbosity=normal"

      - name: Run Pdfe.Rendering.Tests (deterministic only)
        # Same filter rationale as the Linux job — see that job's comment.
        run: |
          dotnet test Pdfe.Rendering.Tests --no-build -c Debug `
            --filter "FullyQualifiedName!~Corpus&FullyQualifiedName!~Differential&FullyQualifiedName!~Benchmark&FullyQualifiedName!~Visual" `
            --logger "console;verbosity=normal"

      - name: Run PdfEditor.Tests
        # Unconditional, no display-server shim needed — same rationale as
        # the macOS job's identical step. *_MatchesBaseline excluded for the
        # same Linux-Skia-baseline reason.
        run: |
          dotnet test PdfEditor.Tests --no-build -c Debug `
            --filter "FullyQualifiedName!~MatchesBaseline" `
            --logger "console;verbosity=normal" `
            --blame-hang-timeout 120000

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-windows
          path: |
            **/TestResults/
            **/*.trx
          retention-days: 7
