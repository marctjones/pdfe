name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  build-test-coverage:
    name: Build, Test & Coverage Gates
    runs-on: ubuntu-latest
    env:
      # ReactiveUI/Splat's author signing certificate was revoked upstream,
      # so a fresh `dotnet restore` fails with NU3012 (revoked cert) for
      # packages that are otherwise the correct published versions. Skip NuGet
      # signature verification in CI so a third-party cert revocation can't
      # block the build. Tracked alongside the ReactiveUI removal in #343.
      DOTNET_NUGET_SIGNATURE_VERIFICATION: false
    steps:
      - uses: actions/checkout@v4

      # Detect whether GUI-relevant code changed. The headless PdfEditor.Tests
      # suite is slow and Avalonia-dispatcher-sensitive; there's no need to run
      # it for library-only changes (e.g. a Pdfe.Core-only PR). It still always
      # runs on pushes to main as a post-merge integration safety net.
      - name: Detect changed areas
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            gui:
              - 'PdfEditor/**'
              - 'PdfEditor.Tests/**'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set up Java (for veraPDF)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install veraPDF
        # The veraPDF binary is only exercised by the Corpus conformance tests,
        # which the gate excludes ("...!~Corpus") and which skip gracefully when
        # absent. A download/installer outage (the 1.28.1 artifact has 404'd)
        # must therefore not fail the whole job. Keep the install best-effort.
        continue-on-error: true
        run: |
          set -uo pipefail
          # Download veraPDF. curl -f fails on HTTP errors (so we never unzip an
          # error page), with retries for transient flakiness.
          curl -fSL --retry 3 --connect-timeout 30 \
            https://software.verapdf.org/releases/1.28/verapdf-greenfield-1.28.1-installer.zip \
            -o /tmp/verapdf.zip \
            || { echo "::warning::veraPDF download failed; skipping veraPDF setup"; exit 0; }
          unzip -q /tmp/verapdf.zip -d /tmp/verapdf-installer \
            || { echo "::warning::veraPDF archive invalid; skipping veraPDF setup"; exit 0; }

          # Create installation response file for silent install
          cat > /tmp/auto-install.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8" standalone="no"?>
          <AutomatedInstallation langpack="eng">
              <com.izforge.izpack.panels.htmlhello.HTMLHelloPanel id="welcome"/>
              <com.izforge.izpack.panels.target.TargetPanel id="install_dir">
                  <installpath>$HOME/verapdf</installpath>
              </com.izforge.izpack.panels.target.TargetPanel>
              <com.izforge.izpack.panels.packs.PacksPanel id="sdk_pack_select">
                  <pack index="0" name="veraPDF GUI" selected="false"/>
                  <pack index="1" name="veraPDF Mac and *nix Scripts" selected="true"/>
                  <pack index="2" name="veraPDF Validation model" selected="true"/>
                  <pack index="3" name="veraPDF Documentation" selected="false"/>
                  <pack index="4" name="veraPDF Sample Plugins" selected="false"/>
              </com.izforge.izpack.panels.packs.PacksPanel>
              <com.izforge.izpack.panels.install.InstallPanel id="install"/>
              <com.izforge.izpack.panels.finish.FinishPanel id="finish"/>
          </AutomatedInstallation>
          EOF

          # Find and run installer
          cd /tmp/verapdf-installer
          INSTALLER=$(find . -name "verapdf-greenfield-*.jar" | head -1)
          if [ -z "$INSTALLER" ]; then
            echo "::warning::veraPDF installer jar not found; skipping veraPDF setup"
            exit 0
          fi
          java -jar "$INSTALLER" /tmp/auto-install.xml || \
            { echo "::warning::veraPDF install failed; continuing without it"; exit 0; }

          # Verify installation (non-fatal)
          ~/verapdf/verapdf --version || true

      - name: Install xvfb for headless UI tests
        if: steps.changes.outputs.gui == 'true' || github.ref == 'refs/heads/main'
        run: sudo apt-get install -y xvfb

      - name: Install test fonts
        # DejaVuSans is the font the embedding tests (#378) load by path; without
        # it those tests skip and Pdfe.Core coverage drops below the gate. Always
        # install so coverage is deterministic.
        run: sudo apt-get install -y fonts-dejavu-core

      - name: Restore packages
        run: dotnet restore

      - name: Verify TRUE Redaction Implementation
        run: ./scripts/verify-true-redaction.sh

      - name: Build (Debug)
        run: dotnet build pdfe.sln -c Debug

      - name: Run Pdfe.Core.Tests with coverage
        run: |
          dotnet test Pdfe.Core.Tests --no-build -c Debug \
            --collect:"XPlat Code Coverage" \
            --results-directory coverage/ \
            --logger "console;verbosity=normal" \
            --verbosity normal

      - name: Install reportgenerator
        run: mkdir -p tools && dotnet tool install --tool-path ./tools dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          ./tools/reportgenerator \
            -reports:coverage/*/coverage.cobertura.xml \
            -targetdir:coverage/report \
            -reporttypes:Cobertura

      - name: Coverage Gate (Pdfe.Core >= 93%)
        # Ratcheted 92% -> 92.5% (#351) after adding in-memory authoring/font/
        # graphics tests (CI now measures ~93.0%, up from ~92.8%). CI installs
        # fonts-dejavu-core above so the embedding tests run deterministically.
        # The full 94% target needs corpus-independent operator/decoder tests
        # (corpus tests inflate LOCAL coverage to ~94.1% but skip in CI) — that
        # remaining work is tracked in #350. Kept a ~0.5% margin so a small
        # coverage dip doesn't block unrelated PRs.
        #
        # reportgenerator's Cobertura output is named Cobertura.xml (not
        # coverage.cobertura.xml — that's coverlet's raw collector name).
        run: scripts/check-coverage.sh coverage/report/Cobertura.xml 0.93 Pdfe.Core

      - name: Run Pdfe.Cli.Tests
        run: |
          dotnet test Pdfe.Cli.Tests --no-build -c Debug \
            --logger "console;verbosity=normal"

      - name: Run Pdfe.Rendering.Tests (deterministic only)
        run: |
          # The PR gate runs only environment-independent rendering tests
          # (root SkiaRenderer "renders without error", string-escape, Fonts
          # table parsing). The following are environment-sensitive and owned
          # by the nightly visual-regression job, not a deterministic PR gate:
          # - Corpus: too slow.
          # - Differential: compares against the external `mutool` binary +
          #   sample PDFs absent in CI → empty [Theory] → "No data found".
          # - Benchmark: timing/allocation thresholds that flake under the
          #   full parallel suite (pass in isolation).
          # - Visual: pixel-baseline comparisons that differ with CI's fonts /
          #   Skia/freetype build.
          dotnet test Pdfe.Rendering.Tests --no-build -c Debug \
            --filter "FullyQualifiedName!~Corpus&FullyQualifiedName!~Differential&FullyQualifiedName!~Benchmark&FullyQualifiedName!~Visual" \
            --logger "console;verbosity=normal"

      - name: Run Performance Benchmark Tests (informational)
        # Allocation/timing thresholds are environment-sensitive; run them for
        # visibility but don't fail the gate on them (the nightly job owns perf).
        run: |
          dotnet test Pdfe.Rendering.Tests --no-build -c Debug \
            --filter "FullyQualifiedName~PerformanceBenchmark|FullyQualifiedName~MemoryBenchmark" \
            --logger "console;verbosity=normal" || true

      - name: Run Pdfe.Ocr.Tests
        run: |
          dotnet test Pdfe.Ocr.Tests --no-build -c Debug \
            --logger "console;verbosity=normal" || true

      - name: Run PdfEditor.Tests (headless with xvfb)
        # Skipped for library-only changes (see "Detect changed areas"); always
        # runs on main. Library changes that affect the GUI are caught by the
        # main run before any release is cut.
        #
        # Excludes the *_MatchesBaseline visual-regression tests: they render a
        # heavy real-world PDF through the real Skia backend (UseHeadlessDrawing
        # =false) and, after the rest of the suite's accumulated dispatcher load,
        # reliably crash the headless test host — the root cause of the chronic
        # #363 "host process exited unexpectedly" failures (the blame collector
        # named whichever test happened to be on the dispatcher, e.g.
        # CtrlS_SavesFile, which is why it looked random). They are
        # environment-sensitive pixel-baseline tests, the same category excluded
        # from the Pdfe.Rendering PR gate, and are owned by the nightly
        # visual-regression job (visual-regression-nightly.yml), not this gate.
        if: steps.changes.outputs.gui == 'true' || github.ref == 'refs/heads/main'
        run: |
          xvfb-run -a dotnet test PdfEditor.Tests --no-build -c Debug \
            --filter "FullyQualifiedName!~MatchesBaseline" \
            --logger "console;verbosity=normal" \
            --blame-hang-timeout 120000

      - name: Upload coverage report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/report/
          retention-days: 30

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/TestResults/
            **/*.trx
          retention-days: 7
