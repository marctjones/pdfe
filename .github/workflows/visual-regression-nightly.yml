name: Visual Regression Tests (Nightly)

# Run nightly at 2 AM UTC (9 PM ET)
on:
  schedule:
    - cron: '0 2 * * *'
  # Allow manual dispatch for testing
  workflow_dispatch:

jobs:
  visual-regression:
    name: Visual Regression & Baseline Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set up Java (for veraPDF)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install veraPDF
        run: |
          wget -q https://software.verapdf.org/releases/1.28/verapdf-greenfield-1.28.1-installer.zip -O /tmp/verapdf.zip
          unzip -q /tmp/verapdf.zip -d /tmp/verapdf-installer
          cat > /tmp/auto-install.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8" standalone="no"?>
          <AutomatedInstallation langpack="eng">
              <com.izforge.izpack.panels.htmlhello.HTMLHelloPanel id="welcome"/>
              <com.izforge.izpack.panels.target.TargetPanel id="install_dir">
                  <installpath>$HOME/verapdf</installpath>
              </com.izforge.izpack.panels.target.TargetPanel>
              <com.izforge.izpack.panels.packs.PacksPanel id="sdk_pack_select">
                  <pack index="0" name="veraPDF GUI" selected="false"/>
                  <pack index="1" name="veraPDF Mac and *nix Scripts" selected="true"/>
                  <pack index="2" name="veraPDF Validation model" selected="true"/>
                  <pack index="3" name="veraPDF Documentation" selected="false"/>
                  <pack index="4" name="veraPDF Sample Plugins" selected="false"/>
              </com.izforge.izpack.panels.packs.PacksPanel>
              <com.izforge.izpack.panels.install.InstallPanel id="install"/>
              <com.izforge.izpack.panels.finish.FinishPanel id="finish"/>
          </AutomatedInstallation>
          EOF
          cd /tmp/verapdf-installer
          INSTALLER=$(find . -name "verapdf-greenfield-*.jar" | head -1)
          java -jar "$INSTALLER" /tmp/auto-install.xml
          ~/verapdf/verapdf --version

      - name: Install xvfb for headless UI tests
        run: sudo apt-get install -y xvfb

      - name: Restore packages
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build pdfe.sln -c Release

      - name: Run Pdfe.Rendering.Tests Visual Tests
        run: |
          dotnet test Pdfe.Rendering.Tests --no-build -c Release \
            --filter "FullyQualifiedName~Visual" \
            --logger "console;verbosity=normal" || true

      - name: Run PdfEditor visual-regression baseline tests (headless)
        # These pixel-baseline render tests (PdfViewerHeadlessRenderTests.*_
        # MatchesBaseline) are excluded from the PR gate in ci.yml because they
        # crash the headless host under the full suite's accumulated load (#363);
        # this nightly job is their owner. NOTE: the filter matches the test
        # name, not the [FixedAvaloniaFact] attribute — the old
        # "FullyQualifiedName~AvaloniaFact" filter matched zero tests, so these
        # had silently not been running at all.
        run: |
          xvfb-run -a dotnet test PdfEditor.Tests --no-build -c Release \
            --filter "FullyQualifiedName~MatchesBaseline" \
            --logger "console;verbosity=normal" \
            --blame-hang-timeout 180000 || true

      - name: Collect visual regression artifacts
        if: always()
        run: |
          mkdir -p visual-regression-output
          find . -type f \( -name "*-actual.png" -o -name "*-diff.png" \) \
            -exec cp {} visual-regression-output/ \;
          find . -type f -path "*test-output*" \( -name "*.png" \) \
            -exec cp {} visual-regression-output/ \; || true

      - name: Upload visual regression diffs on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: visual-regression-output/
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: |
          echo "## Visual Regression Tests Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the uploaded visual-regression-diffs artifact for details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This is a nightly informational test. The build is not blocked." >> $GITHUB_STEP_SUMMARY
